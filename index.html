<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EchoMind | AI情绪成长教练</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="top-shell fade-in">
        <div class="brand">
          <span class="brand-mark">E</span>
          <span>EchoMind</span>
        </div>
        <p class="eyebrow">AI Emotion Growth Coach</p>
      </header>

      <section id="home-view" class="view-card view-card-home fade-in is-active">
        <div class="hero-panel">
          <div class="hero-copy">
            <p class="guide-text">是什么让你现在有点卡住？</p>
            <p class="guide-text">或者，聊聊最近发生的事</p>
          </div>
          <button id="start-button" class="primary-button" type="button">开始了解自己</button>
        </div>
      </section>

      <section id="choice-view" class="view-card view-card-choice fade-in" aria-hidden="true">
        <div class="stack-actions compact-actions">
          <button id="known-type-button" class="primary-button" type="button">我知道我的类型</button>
          <button id="unknown-type-button" class="option-button" type="button">我还不知道我的类型（开始测试）</button>
          <p class="helper-text">测试将在新页面打开，完成后可以返回这里继续使用</p>
        </div>
      </section>

      <section id="mbti-view" class="view-card view-card-mbti fade-in" aria-hidden="true">
        <div class="mbti-header single-action">
          <div class="unknown-type-group">
            <button id="unknown-type-link" class="back-link" type="button">我还不知道我的类型</button>
          </div>
        </div>

        <div id="mbti-grid" class="mbti-grid">
          <button class="mbti-card row-green" type="button" data-type="ENFP">ENFP</button>
          <button class="mbti-card row-green" type="button" data-type="INFP">INFP</button>
          <button class="mbti-card row-green" type="button" data-type="ENFJ">ENFJ</button>
          <button class="mbti-card row-green" type="button" data-type="INFJ">INFJ</button>

          <button class="mbti-card row-purple" type="button" data-type="ENTP">ENTP</button>
          <button class="mbti-card row-purple" type="button" data-type="INTP">INTP</button>
          <button class="mbti-card row-purple" type="button" data-type="ENTJ">ENTJ</button>
          <button class="mbti-card row-purple" type="button" data-type="INTJ">INTJ</button>

          <button class="mbti-card row-yellow" type="button" data-type="ESFP">ESFP</button>
          <button class="mbti-card row-yellow" type="button" data-type="ISFP">ISFP</button>
          <button class="mbti-card row-yellow" type="button" data-type="ESTP">ESTP</button>
          <button class="mbti-card row-yellow" type="button" data-type="ISTP">ISTP</button>

          <button class="mbti-card row-blue" type="button" data-type="ESTJ">ESTJ</button>
          <button class="mbti-card row-blue" type="button" data-type="ISTJ">ISTJ</button>
          <button class="mbti-card row-blue" type="button" data-type="ESFJ">ESFJ</button>
          <button class="mbti-card row-blue" type="button" data-type="ISFJ">ISFJ</button>
        </div>

        <div id="selection-feedback" class="selection-feedback" aria-live="polite">
          还没有选择类型
        </div>
      </section>

      <section id="style-test-view" class="view-card view-card-test fade-in" aria-hidden="true">
        <div class="test-intro">
          <h2>我们想先更了解你一点</h2>
          <p class="helper-text centered-helper">没有对错，只是帮助我们用更适合你的方式和你交流</p>
        </div>

        <div id="question-card" class="question-card">
          <div class="question-meta">
            <span id="question-progress">第 1 题 / 共 12 题</span>
            <span id="selected-mbti">MBTI：未选择</span>
          </div>
          <div class="question-body">
            <h3 id="question-title"></h3>
            <div id="question-options" class="question-options"></div>
          </div>
        </div>

        <div class="test-actions">
          <button id="next-question-button" class="primary-button" type="button" disabled>下一题</button>
        </div>
      </section>

      <section id="style-result-view" class="view-card view-card-result fade-in" aria-hidden="true">
        <div class="result-panel">
          <p class="eyebrow">沟通风格结果</p>
          <h2 id="result-title">你的沟通偏好：</h2>
          <p id="result-description" class="result-description"></p>
          <button id="start-chat-button" class="primary-button" type="button">开始聊一聊</button>
        </div>
      </section>

      <section id="chat-view" class="view-card view-card-chat fade-in" aria-hidden="true">
        <div class="chat-header">
          <div>
            <p class="eyebrow">对话已开始</p>
            <h2>现在，我们可以慢慢聊</h2>
          </div>
          <div class="chat-badges">
            <span id="chat-mbti-badge" class="chat-badge">MBTI：未选择</span>
            <span id="chat-style-badge" class="chat-badge">风格：未识别</span>
          </div>
        </div>

        <div id="chat-messages" class="chat-messages" aria-live="polite"></div>

        <form id="chat-form" class="chat-form">
          <label class="chat-input-wrap" for="chat-input">
            <textarea id="chat-input" placeholder="你可以从最近让你卡住的一件事开始说起..." rows="4"></textarea>
          </label>
          <div class="chat-actions">
            <button id="chat-send-button" class="primary-button" type="submit">发送</button>
          </div>
        </form>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
