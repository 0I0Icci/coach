<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EchoMind | AI情绪成长教练</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-card fade-in">
        <div class="brand">
          <span class="brand-mark">E</span>
          <span>EchoMind</span>
        </div>

        <div class="hero-copy">
          <p class="eyebrow">AI Emotion Growth Coach</p>
          <h1>你现在在想什么？</h1>
          <p class="hero-text">我们可以一起慢慢想清楚</p>
        </div>

        <div class="hero-action">
          <button id="start-button" class="primary-button" type="button">开始了解自己</button>

          <div id="entry-options" class="entry-options" aria-hidden="true">
            <button class="option-button" type="button">我知道我的类型</button>
            <button class="option-button" type="button">我还不知道（开始测试）</button>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
