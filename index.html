<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EchoMind | AI情绪成长教练</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <div class="brand fade-in">
        <span class="brand-mark">E</span>
        <span>EchoMind</span>
      </div>

      <section id="home-view" class="view-card view-card-home fade-in is-active">
        <div class="view-intro">
          <p class="eyebrow">AI Emotion Growth Coach</p>
          <p class="intro-text">或者，聊聊最近发生的事</p>
        </div>

        <div class="hero-panel">
          <h1>是什么让你现在有点卡住？</h1>
          <button id="start-button" class="primary-button" type="button">开始了解自己</button>
        </div>
      </section>

      <section id="choice-view" class="view-card fade-in" aria-hidden="true">
        <div class="view-intro compact">
          <p class="eyebrow">下一步</p>
          <p class="intro-text">选择一种更适合你的开始方式</p>
        </div>

        <div class="stack-actions">
          <button id="known-type-button" class="primary-button" type="button">我知道我的类型</button>
          <button id="unknown-type-button" class="option-button" type="button">我还不知道我的类型（开始测试）</button>
          <p class="helper-text">测试将在新页面打开，完成后可以返回这里继续使用</p>
        </div>
      </section>

      <section id="mbti-view" class="view-card fade-in" aria-hidden="true">
        <div class="mbti-header">
          <button id="unknown-type-link" class="back-link" type="button">我还不知道我的类型</button>
          <button id="back-to-choice" class="subtle-link" type="button">返回选择</button>
        </div>

        <div class="view-intro compact narrow">
          <p class="eyebrow">MBTI Type</p>
          <h2>选择你已经知道的类型</h2>
          <p class="intro-text">先完成类型选择，后续这里会接入更个性化的 AI 对话入口</p>
        </div>

        <div id="mbti-grid" class="mbti-grid">
          <button class="mbti-card row-green" type="button" data-type="INFP">INFP</button>
          <button class="mbti-card row-green" type="button" data-type="ENFP">ENFP</button>
          <button class="mbti-card row-green" type="button" data-type="INFJ">INFJ</button>
          <button class="mbti-card row-green" type="button" data-type="ENFJ">ENFJ</button>

          <button class="mbti-card row-purple" type="button" data-type="INTP">INTP</button>
          <button class="mbti-card row-purple" type="button" data-type="ENTP">ENTP</button>
          <button class="mbti-card row-purple" type="button" data-type="INTJ">INTJ</button>
          <button class="mbti-card row-purple" type="button" data-type="ENTJ">ENTJ</button>

          <button class="mbti-card row-yellow" type="button" data-type="ISFP">ISFP</button>
          <button class="mbti-card row-yellow" type="button" data-type="ESFP">ESFP</button>
          <button class="mbti-card row-yellow" type="button" data-type="ISFJ">ISFJ</button>
          <button class="mbti-card row-yellow" type="button" data-type="ESFJ">ESFJ</button>

          <button class="mbti-card row-blue" type="button" data-type="ISTP">ISTP</button>
          <button class="mbti-card row-blue" type="button" data-type="ESTP">ESTP</button>
          <button class="mbti-card row-blue" type="button" data-type="ISTJ">ISTJ</button>
          <button class="mbti-card row-blue" type="button" data-type="ESTJ">ESTJ</button>
        </div>

        <div id="selection-feedback" class="selection-feedback" aria-live="polite">
          还没有选择类型
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
